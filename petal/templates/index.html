{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetalScripts 🎀</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'petal/style.css' %}">
</head>
<body>

    <div class="glass-card main-ui">
        <h1 class="petal-title">PetalScripts 🎀</h1>
        
        <div class="icon-group">
            <i class="fas fa-camera-retro icon-btn" title="Photobooth" onclick="togglePhotobooth()"></i>
            <i class="fas fa-paper-plane icon-btn" title="Send Song & Message" onclick="toggleMessages()"></i>
        </div>

        <div id="welcome-message" class="premium-text">
            Choose an action to get started 💖
        </div>
    </div>

    <div id="message-panel" class="modal-panel hidden">
        <div class="panel-content glass-card">
            <span class="close-btn" onclick="toggleMessages()">&times;</span>
            <h2 class="petal-subtitle">Send a Song 🎀</h2>
            
            <div class="search-group">
                <input type="text" id="recipient-search" placeholder="Search for a friend..." class="premium-input">
            </div>
            
            <form id="message-form" method="POST">
                {% csrf_token %}
                <div class="input-wrapper">
                    <label class="premium-label">For Whom: <span class="required-star">*</span></label>
                    <input type="text" id="for-whom-field" name="for_whom" placeholder="Recipient's name" required class="premium-input-field">
                </div>
                <textarea id="message-field" name="message" placeholder="Type your sweet message or song link... 🌸" class="premium-textarea"></textarea>
                <button type="submit" class="premium-save-btn">Save Message 💾</button>
            </form>
        </div>
    </div>

    <div id="photobooth-panel" class="modal-panel hidden">
    <div class="panel-content glass-card">
        <span class="close-btn" onclick="togglePhotobooth()">&times;</span>
        <h2 class="petal-subtitle">PetalBooth 📸</h2>

        <div class="booth-container">
            <video id="video-feed" autoplay playsinline class="photo-view"></video>
            <canvas id="snapshot-canvas" class="hidden"></canvas>
        </div>

        <div class="effect-selectors">
            <button class="effect-btn active" onclick="applyFilter('none')">Normal</button>
            <button class="effect-btn" onclick="applyFilter('nokia')">Nokia</button>
            <button class="effect-btn" onclick="applyFilter('vintage')">Vintage</button>
            <button class="effect-btn" onclick="applyFilter('sony')">Sony</button>
            <button class="effect-btn" onclick="applyFilter('blue3k')">Blue 3K</button>
        </div>

        <button class="btn-capture" onclick="takePhoto()">Capture! 💖</button>
    </div>
</div>

<script src="{% static 'petal/script.js' %}"></script>
</body>
</html>
