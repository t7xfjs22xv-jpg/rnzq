{% extends 'petal/base.html' %}
{% block content %}
<div class="glass-card" style="max-width: 600px;">
    <h2 class="petal-title">Received Petals 💌</h2>
    <div class="message-list" style="text-align: left; max-height: 400px; overflow-y: auto;">
        {% for msg in messages %}
            <div style="background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #ffb6c1;">
                <strong>From: {{ msg.sender_name }}</strong><br>
                <p>{{ msg.content }}</p>
                <small style="color: #ff85a2;">Sent on: {{ msg.created_at }}</small>
            </div>
        {% empty %}
            <p>No messages yet! 🌸</p>
        {% endfor %}
    </div>
    <br>
    <a href="{% url 'home' %}" class="icon-btn" style="font-size: 18px; text-decoration: none;">Go Back</a>
</div>
{% endblock %}
